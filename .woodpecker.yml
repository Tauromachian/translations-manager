when:
  - event: push
    branch: main

steps:
  - name: Deploy project over SSH
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: SSH_HOST
      username:
        from_secret: SSH_USERNAME
      password:
        from_secret: SSH_PASSWORD
      port: 22
      envs:
        - DB_USER
        - DB_PASSWORD
        - DB_PORT
        - DB_NAME
      script:
        - |
          if [ -d translations-manager ]; then
            cd translations-manager
            git pull --rebase -Xours
          else
            git clone https://github.com/Tauromachian/translations-manager.git
            cd translations-manager
          fi

          cat > .env << EOF
          APP_ENV=production
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          DB_PORT=${DB_PORT}
          DB_NAME=${DB_NAME}
          DB_HOST=db
          EOF

          docker compose down
          docker compose build --no-cache
          docker compose up -d

          docker exec translations-manager-web-1 deno run db:push
