when:
  - event: push
    branch: main

steps:
  - name: Deploy project over SSH
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: SSH_HOST
      username:
        from_secret: SSH_USERNAME
      password:
        from_secret: SSH_PASSWORD
      port: 22
      script:
        - |
          if [ -d translations-manager ]; then
            cd translations-manager
            git pull --rebase -Xours
          else
            git clone https://github.com/Tauromachian/translations-manager.git
            cd translations-manager
          fi

          cat > .env << EOF
          APP_ENV=production
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          DB_PORT=${DB_PORT}
          DB_NAME=${DB_NAME}
          DB_HOST=db
          EOF

          docker compose down
          docker compose build --no-cache
          docker compose up -d

          docker exec translations-manager-web-1 deno run db:push

    environment:
      APP_ENV: production
      DB_NAME:
        from_secret: DB_NAME
      DB_PASSWORD:
        from_secret: DB_PASSWORD
      DB_PORT:
        from_secret: DB_PORT
      DB_USER:
        from_secret: DB_USER
