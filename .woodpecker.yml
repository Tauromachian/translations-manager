when:
  - event: push
    branch: main

steps:
  - name: Deploy project over SSH
    image: appleboy/drone-ssh
    environment:
      APP_ENV: production
      DB_NAME:
        from_secret: DB_NAME
      DB_PASSWORD:
        from_secret: DB_PASSWORD
      DB_PORT:
        from_secret: DB_PORT
      DB_USER:
        from_secret: DB_USER
    settings:
      host:
        from_secret: SSH_HOST
      username:
        from_secret: SSH_USERNAME
      password:
        from_secret: SSH_PASSWORD
      script:
        - |
          if [ -d translations-manager ]; then
            git pull --rebase -Xours
          else
            git clone https://github.com/Tauromachian/translations-manager.git
          fi

          cd translations-manager

          echo 'APP_ENV=production' > .env
          echo 'DB_USER=${{ secrets.DB_USER }}' >> .env
          echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' >> .env
          echo 'DB_PORT=${{ secrets.DB_PORT }}' >> .env
          echo 'DB_NAME=${{ secrets.DB_NAME }}' >> .env
          echo 'DB_HOST=db' >> .env

          docker compose down
          docker compose build --no-cache
          docker compose up -d

          docker exec translations-manager-web-1 deno run db:push
